name: Publish Module

on:
  push:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install required modules from PSGallery
        run: ./scripts/build/ci/Install-CiPowerShellModules.ps1

      - name: Build Module
        run: Invoke-NovaBuild -Verbose -ContinuousIntegration

      - name: Run Pester Tests
        run: Test-NovaBuild

      - name: Generate Report
        continue-on-error: true
        run: |
          $reportLines = @('## Output Files 📁', '')
          $files = Get-ChildItem -Path ./dist -Recurse -ErrorAction SilentlyContinue | Sort-Object FullName

          if ($files) {
            $reportLines += '| Name | Directory |'
            $reportLines += '| --- | --- |'
            $reportLines += $files | ForEach-Object {
              $name = ('' + $_.Name).Replace('|', '\|')
              $directory = ('' + $_.Directory).Replace('|', '\|')
              "| $name | $directory |"
            }
          }
          else {
            $reportLines += 'No files found in `./dist`.'
          }

          $report = $reportLines -join [Environment]::NewLine
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $report
          Write-Output $report

      - name: Run semantic-release
        if: github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSGALLERY_API: ${{ secrets.PSGALLERY_API }}
        run: npx semantic-release

      - name: Prepare next prerelease version on main -> develop
        if: github.ref_name == 'main'
        run: |
          git fetch origin main
          git fetch origin develop

          git checkout develop
          git reset --hard origin/main

          Update-NovaModuleVersion -Preview -Verbose -ContinuousIntegration

      - name: Prepare next prerelease version on develop
        if: github.ref_name == 'develop'
        run: |
          $ErrorActionPreference = 'Stop'

          git fetch origin develop
          git checkout develop

          $psResourcePath = Join-Path $HOME '.local/share/PSResourceGet'
          New-Item -ItemType Directory -Path $psResourcePath -Force | Out-Null

          if (-not (Get-PSResourceRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSResourceRepository -PSGallery
          }

          Publish-NovaModule -Repository PSGallery -ApiKey $env:PSGALLERY_API -SkipTests -ContinuousIntegration
          Update-NovaModuleVersion -Preview -Verbose -ContinuousIntegration
        env:
          PSGALLERY_API: ${{ secrets.PSGALLERY_API }}

      - name: Commit and push (verified)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const { execSync } = require('child_process')

            const owner = context.repo.owner
            const repo = context.repo.repo
            const sourceBranch = context.ref.replace('refs/heads/', '')
            const targetBranch = 'develop'

            const files = execSync('git diff --name-only', { encoding: 'utf-8' })
              .split('\n')
              .filter(Boolean)

            if (files.length === 0) {
              console.log('No changes to commit')
              return
            }

            let parentSha
            let baseTreeSha

            if (sourceBranch === 'main') {
              // main release: make develop continue directly from released main
              const mainRef = await github.rest.git.getRef({
                owner,
                repo,
                ref: 'heads/main'
              })

              const mainCommit = await github.rest.git.getCommit({
                owner,
                repo,
                commit_sha: mainRef.data.object.sha
              })

              parentSha = mainRef.data.object.sha
              baseTreeSha = mainCommit.data.tree.sha
            }
            else if (sourceBranch === 'develop') {
              // develop prerelease: bump version on top of current develop
              const developRef = await github.rest.git.getRef({
                owner,
                repo,
                ref: 'heads/develop'
              })

              const developCommit = await github.rest.git.getCommit({
                owner,
                repo,
                commit_sha: developRef.data.object.sha
              })

              parentSha = developRef.data.object.sha
              baseTreeSha = developCommit.data.tree.sha
            }
            else {
              core.setFailed(`Unsupported source branch: ${sourceBranch}`)
              return
            }

            const blobs = []

            for (const file of files) {
              const content = fs.readFileSync(file, 'utf8')

              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content,
                encoding: 'utf-8'
              })

              blobs.push({
                path: file,
                mode: '100644',
                type: 'blob',
                sha: blob.data.sha
              })
            }

            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseTreeSha,
              tree: blobs
            })

            const message =
              sourceBranch === 'main'
                ? 'chore: prepare develop for next prerelease [skip ci]'
                : 'chore: prepare next prerelease version [skip ci]'

            const newCommit = await github.rest.git.createCommit({
              owner,
              repo,
              message,
              tree: tree.data.sha,
              parents: [parentSha]
            })

            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${targetBranch}`,
              sha: newCommit.data.sha,
              force: sourceBranch === 'main'
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
