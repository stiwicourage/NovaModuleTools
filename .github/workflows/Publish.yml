name: Publish Module

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install required modules from PSGallery
        run: ./scripts/build/ci/Install-CiPowerShellModules.ps1

      - name: Build Module
        run: Invoke-NovaBuild -Verbose

      - name: Run Pester Tests
        run: Test-NovaBuild

      - name: Generate Report
        continue-on-error: true
        run: |
          $reportLines = @('## Output Files 📁', '')
          $files = Get-ChildItem -Path ./dist -Recurse -ErrorAction SilentlyContinue | Sort-Object FullName

          if ($files) {
            $reportLines += '| Name | Directory |'
            $reportLines += '| --- | --- |'
            $reportLines += $files | ForEach-Object {
              $name = ('' + $_.Name).Replace('|', '\|')
              $directory = ('' + $_.Directory).Replace('|', '\|')
              "| $name | $directory |"
            }
          }
          else {
            $reportLines += 'No files found in `./dist`.'
          }

          $report = $reportLines -join [Environment]::NewLine
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $report
          Write-Output $report

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSGALLERY_API: ${{ secrets.PSGALLERY_API }}
        run: npx semantic-release

      - name: Prepare next prerelease version on develop
        if: github.ref_name == 'main'
        run: |
          git fetch origin main
          git fetch origin develop

          git checkout develop
          git reset --hard origin/main

          Update-NovaModuleVersion -Preview

      - name: Commit and push (verified)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const owner = context.repo.owner
            const repo = context.repo.repo
            const branch = "develop"

            // Find changed files
            const { execSync } = require('child_process')
            const files = execSync('git diff --name-only', { encoding: 'utf-8' })
              .split('\n')
              .filter(f => f)

            if (files.length === 0) {
              console.log("No changes to commit")
              return
            }

            const blobs = []

            for (const file of files) {
              const content = fs.readFileSync(file, 'utf8')

              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content,
                encoding: 'utf-8'
              })

              blobs.push({
                path: file,
                mode: '100644',
                type: 'blob',
                sha: blob.data.sha
              })
            }

            // Get latest commit on develop
            const ref = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${branch}`
            })

            const commit = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: ref.data.object.sha
            })

            // Create tree
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: commit.data.tree.sha,
              tree: blobs
            })

            // Create commit (THIS becomes VERIFIED)
            const newCommit = await github.rest.git.createCommit({
              owner,
              repo,
              message: "chore: prepare next prerelease version [skip ci]",
              tree: tree.data.sha,
              parents: [ref.data.object.sha]
            })

            // Update branch
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${branch}`,
              sha: newCommit.data.sha
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
