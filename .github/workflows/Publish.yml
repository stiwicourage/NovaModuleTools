name: Publish Module

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install required modules from PSGallery
        run: ./scripts/build/ci/Install-CiPowerShellModules.ps1

      - name: Build Module
        run: Invoke-NovaBuild -Verbose

      - name: Run Pester Tests
        run: Test-NovaBuild

      - name: Generate Report
        continue-on-error: true
        run: |
          $reportLines = @('## Output Files 📁', '')
          $files = Get-ChildItem -Path ./dist -Recurse -ErrorAction SilentlyContinue | Sort-Object FullName

          if ($files) {
            $reportLines += '| Name | Directory |'
            $reportLines += '| --- | --- |'
            $reportLines += $files | ForEach-Object {
              $name = ('' + $_.Name).Replace('|', '\|')
              $directory = ('' + $_.Directory).Replace('|', '\|')
              "| $name | $directory |"
            }
          }
          else {
            $reportLines += 'No files found in `./dist`.'
          }

          $report = $reportLines -join [Environment]::NewLine
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $report
          Write-Output $report

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PSGALLERY_API: ${{ secrets.PSGALLERY_API }}
        run: npx semantic-release

      - name: Prepare next prerelease version on develop
        if: github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git fetch origin develop

          git checkout develop
          git pull origin develop

          # Bring the released main state back into develop first
          git merge origin/main --no-edit -m "chore: merge main back into develop [skip ci]"

          # Bump develop to next prerelease version
          Update-NovaModuleVersion -Preview

          git add .
          git commit -m "chore: prepare next prerelease version [skip ci]" || echo "No changes to commit"
          git push origin develop